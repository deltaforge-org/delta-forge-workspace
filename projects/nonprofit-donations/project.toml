[project]
id = "nonprofit-donations"
name = "Nonprofit Donations Pipeline"
version = "1.0.0"
author = "Delta Forge Team"
description = """
Advanced nonprofit donations pipeline implementing medallion architecture with Change Data Feed (CDF)
to track donor tier promotions and demotions, CHECK constraints for data quality (amount > 0, valid
campaign dates), and time travel for historical donor status snapshots. Gold layer includes a star
schema with fact_donations, donor/campaign/fund dimensions, and a KPI fundraising dashboard with
campaign effectiveness, donor retention analysis, tier migration tracking, and recurring vs one-time
revenue trends.
"""
industry = "nonprofit"
categories = ["pipeline", "medallion", "nonprofit", "charity"]
tags = ["cdf", "check-constraints", "time-travel", "donor-retention", "tier-migration", "star-schema", "pseudonymisation"]
difficulty = "advanced"
estimated_time_minutes = 20
load_type = "both"

[project.variables]
data_path = { description = "Root path for Delta table storage", required = true }
zone_prefix = { description = "Zone name for this project", required = false, default = "npo" }
current_user = { description = "Current user for GRANT statements", required = true }

[project.pipeline]
name = "nonprofit_donations_pipeline"
schedule = "0 10 * * 1"
timezone = "America/New_York"

[[project.target_objects]]
type = "delta_table"
name = "{{zone_prefix}}.bronze.raw_donations"

[[project.target_objects]]
type = "delta_table"
name = "{{zone_prefix}}.bronze.raw_donors"

[[project.target_objects]]
type = "delta_table"
name = "{{zone_prefix}}.bronze.raw_campaigns"

[[project.target_objects]]
type = "delta_table"
name = "{{zone_prefix}}.bronze.raw_funds"

[[project.target_objects]]
type = "delta_table"
name = "{{zone_prefix}}.silver.donors_tiered"

[[project.target_objects]]
type = "delta_table"
name = "{{zone_prefix}}.silver.donations_enriched"

[[project.target_objects]]
type = "delta_table"
name = "{{zone_prefix}}.gold.fact_donations"

[[project.target_objects]]
type = "delta_table"
name = "{{zone_prefix}}.gold.dim_donor"

[[project.target_objects]]
type = "delta_table"
name = "{{zone_prefix}}.gold.dim_campaign"

[[project.target_objects]]
type = "delta_table"
name = "{{zone_prefix}}.gold.dim_fund"

[[project.target_objects]]
type = "delta_table"
name = "{{zone_prefix}}.gold.kpi_fundraising"
