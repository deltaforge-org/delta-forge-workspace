[project]
id = "cybersecurity-incidents"
name = "Cybersecurity Incidents Pipeline"
version = "1.0.0"
author = "Delta Forge Team"
description = """
Advanced cybersecurity SIEM alert pipeline with duplicate alert correlation using ROW_NUMBER window
deduplication, MITRE ATT&CK tactic classification, threat intelligence enrichment, mean-time-to-detect
calculations, and bloom filter optimization for IP lookups. Features a gold-layer star schema with
hourly threat dashboard KPIs and incident fact table.
"""
industry = "cybersecurity"
categories = ["pipeline", "medallion", "cybersecurity"]
tags = ["PII", "data-protection", "transformation", "incremental-load", "MITRE", "threat-intel", "bloom-filter", "OPTIMIZE", "star-schema"]
difficulty = "advanced"
estimated_time_minutes = 15
load_type = "incremental"

[project.variables]
data_path = { description = "Root path for Delta table storage", required = true }
zone_prefix = { description = "Zone name for this project", required = false, default = "cyber" }
current_user = { description = "Current user for GRANT statements", required = true }

[project.pipeline]
name = "cyber_incident_pipeline"
schedule = "*/15 * * * *"
timezone = "UTC"

[[project.target_objects]]
type = "delta_table"
name = "{{zone_prefix}}.bronze.raw_alerts"

[[project.target_objects]]
type = "delta_table"
name = "{{zone_prefix}}.bronze.raw_source_ips"

[[project.target_objects]]
type = "delta_table"
name = "{{zone_prefix}}.bronze.raw_targets"

[[project.target_objects]]
type = "delta_table"
name = "{{zone_prefix}}.bronze.raw_rules"

[[project.target_objects]]
type = "delta_table"
name = "{{zone_prefix}}.silver.incidents_correlated"

[[project.target_objects]]
type = "delta_table"
name = "{{zone_prefix}}.gold.dim_source_ip"

[[project.target_objects]]
type = "delta_table"
name = "{{zone_prefix}}.gold.dim_target"

[[project.target_objects]]
type = "delta_table"
name = "{{zone_prefix}}.gold.dim_rule"

[[project.target_objects]]
type = "delta_table"
name = "{{zone_prefix}}.gold.fact_incidents"

[[project.target_objects]]
type = "delta_table"
name = "{{zone_prefix}}.gold.kpi_threat_dashboard"
