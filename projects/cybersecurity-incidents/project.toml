[project]
id = "cybersecurity-incidents"
name = "Cybersecurity Incidents Pipeline"
version = "2.0.0"
author = "Delta Forge Team"
description = """
SOC (Security Operations Center) SIEM pipeline ingesting alerts from 3 sources (firewall, IDS,
endpoint) every 15 minutes. Deduplicates within 5-minute windows via ROW_NUMBER, correlates
multi-alert incidents using window-based gap detection, enriches with threat intelligence scores,
classifies by MITRE ATT&CK framework (15 techniques across 7 tactics), calculates MTTD/MTTR,
and maintains a real-time threat dashboard. Features bloom filters on source_ip, OPTIMIZE
compaction, pseudonymisation of IP addresses, and a gold-layer star schema with 4 dimensions.
"""
industry = "cybersecurity"
categories = ["pipeline", "medallion", "cybersecurity"]
tags = ["PII", "data-protection", "MITRE", "threat-intel", "bloom-filter", "OPTIMIZE", "star-schema", "multi-source", "incident-correlation", "pseudonymisation", "window-dedup"]
difficulty = "advanced"
estimated_time_minutes = 20
load_type = "full"

[project.pipeline]
name = "cyber_incident_pipeline"
schedule = "*/15 * * * *"
timezone = "UTC"

[[project.target_objects]]
type = "delta_table"
name = "{{zone_prefix}}.bronze.raw_firewall_alerts"

