[project]
id = "pharma-clinical-trials"
name = "Pharma Clinical Trials Pipeline"
version = "1.0.0"
author = "Delta Forge Team"
description = """
Advanced pharmaceutical clinical trials pipeline implementing medallion architecture with
all four pseudonymisation transforms (REDACT SSN, MASK email, keyed_hash participant_name,
generalize DOB to decade), deletion vectors for GDPR right-to-erasure of withdrawn participants,
and RESTORE for recovering accidentally purged data. Features a gold-layer star schema with
fact_observations, participant/trial/site/visit dimensions, and trial efficacy KPIs including
response rates, adverse event analysis, and enrollment funnel metrics.
"""
industry = "pharmaceutical"
categories = ["pipeline", "medallion", "pharma", "clinical-trials"]
tags = ["pseudonymisation", "deletion-vectors", "GDPR", "RESTORE", "star-schema", "full-load", "adverse-events", "biomarkers"]
difficulty = "advanced"
estimated_time_minutes = 20
load_type = "full"

[project.variables]
data_path = { description = "Root path for Delta table storage", required = true }
zone_prefix = { description = "Zone name for this project", required = false, default = "pharma" }
current_user = { description = "Current user for GRANT statements", required = true }

[project.pipeline]
name = "pharma_clinical_trials_pipeline"
schedule = "0 8 * * *"
timezone = "UTC"

[[project.target_objects]]
type = "delta_table"
name = "{{zone_prefix}}.bronze.raw_participants"

[[project.target_objects]]
type = "delta_table"
name = "{{zone_prefix}}.bronze.raw_trials"

[[project.target_objects]]
type = "delta_table"
name = "{{zone_prefix}}.bronze.raw_sites"

[[project.target_objects]]
type = "delta_table"
name = "{{zone_prefix}}.bronze.raw_visits"

[[project.target_objects]]
type = "delta_table"
name = "{{zone_prefix}}.bronze.raw_observations"

[[project.target_objects]]
type = "delta_table"
name = "{{zone_prefix}}.silver.participant_clean"

[[project.target_objects]]
type = "delta_table"
name = "{{zone_prefix}}.silver.observation_enriched"

[[project.target_objects]]
type = "delta_table"
name = "{{zone_prefix}}.gold.fact_observations"

[[project.target_objects]]
type = "delta_table"
name = "{{zone_prefix}}.gold.dim_participant"

[[project.target_objects]]
type = "delta_table"
name = "{{zone_prefix}}.gold.dim_trial"

[[project.target_objects]]
type = "delta_table"
name = "{{zone_prefix}}.gold.dim_site"

[[project.target_objects]]
type = "delta_table"
name = "{{zone_prefix}}.gold.dim_visit"

[[project.target_objects]]
type = "delta_table"
name = "{{zone_prefix}}.gold.kpi_trial_efficacy"
