[project]
id = "government-tax-filing"
name = "Government Tax Filing Pipeline"
version = "1.0.0"
author = "Delta Forge Team"
description = """
Advanced government tax filing pipeline implementing medallion architecture with
pseudonymisation (REDACT SSN, MASK taxpayer_name), partitioning by fiscal_year,
Change Data Feed (CDF) for tracking filing status changes, and both full and
incremental load patterns. Features a gold-layer star schema with fact_filings,
taxpayer/jurisdiction/preparer dimensions, and revenue analysis KPIs including
compliance rates, audit flagging, and effective tax rate analysis.
"""
industry = "government"
categories = ["pipeline", "medallion", "government", "tax"]
tags = ["pseudonymisation", "partitioning", "CDF", "MERGE", "star-schema", "incremental", "audit-detection"]
difficulty = "advanced"
estimated_time_minutes = 18
load_type = "both"

[project.variables]
data_path = { description = "Root path for Delta table storage", required = true }
zone_prefix = { description = "Zone name for this project", required = false, default = "tax" }
current_user = { description = "Current user for GRANT statements", required = true }

[project.pipeline]
name = "tax_filing_pipeline"
schedule = "0 1 * * *"
timezone = "America/New_York"

[[project.target_objects]]
type = "delta_table"
name = "{{zone_prefix}}.bronze.raw_filings"

[[project.target_objects]]
type = "delta_table"
name = "{{zone_prefix}}.bronze.raw_taxpayers"

[[project.target_objects]]
type = "delta_table"
name = "{{zone_prefix}}.bronze.raw_jurisdictions"

[[project.target_objects]]
type = "delta_table"
name = "{{zone_prefix}}.bronze.raw_preparers"

[[project.target_objects]]
type = "delta_table"
name = "{{zone_prefix}}.silver.filings"

[[project.target_objects]]
type = "delta_table"
name = "{{zone_prefix}}.silver.taxpayer_enriched"

[[project.target_objects]]
type = "delta_table"
name = "{{zone_prefix}}.gold.fact_filings"

[[project.target_objects]]
type = "delta_table"
name = "{{zone_prefix}}.gold.dim_taxpayer"

[[project.target_objects]]
type = "delta_table"
name = "{{zone_prefix}}.gold.dim_jurisdiction"

[[project.target_objects]]
type = "delta_table"
name = "{{zone_prefix}}.gold.dim_preparer"

[[project.target_objects]]
type = "delta_table"
name = "{{zone_prefix}}.gold.kpi_revenue_analysis"
