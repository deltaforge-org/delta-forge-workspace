[project]
id = "government-tax-filing"
name = "Government Tax Filing Pipeline"
version = "2.0.0"
author = "Delta Forge Team"
description = """
Enterprise government tax filing pipeline implementing append-only immutable filings with separate amendment
tracking, CDF-driven audit trail capturing every change, partitioning by fiscal_year, pseudonymisation
(REDACT SSN, MASK taxpayer_name), bloom filter on taxpayer_id for fast lookup, point-in-time "filings as of
processing deadline" via time travel, and a star schema with fact_filings joining originals + amendments.
Features dim_taxpayer, dim_jurisdiction, dim_preparer, dim_fiscal_year, KPI revenue analysis by
jurisdiction x year with compliance rate and audit yield, and KPI preparer quality with error rates
and amendment rates per preparer. 50 filings across FY2022-2024, 12 amendments, 20 taxpayers, 6
jurisdictions, 5 preparers, 4 audit-flagged filings, and 2 high-amendment-rate preparers.
"""
industry = "government"
categories = ["pipeline", "medallion", "government", "tax"]
tags = ["pseudonymisation", "partitioning", "CDF", "MERGE", "star-schema", "incremental", "audit-detection", "append-only", "amendments", "bloom-filter", "RESTORE"]
difficulty = "advanced"
estimated_time_minutes = 25
load_type = "both"

[project.pipeline]
name = "tax_filing_pipeline"
schedule = "0 1 * * *"
timezone = "America/New_York"

