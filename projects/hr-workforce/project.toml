[project]
id = "hr-workforce"
name = "HR Workforce Analytics Pipeline"
version = "2.0.0"
author = "Delta Forge Team"
description = """
Full employee lifecycle pipeline: hire -> promotions -> transfers -> compensation changes ->
termination. SCD2 captures every change (32 dimension rows from 20 employees). All five
pseudonymisation transforms (REDACT, MASK, keyed_hash, generalize) protect sensitive fields.
CDF feeds an org change log for compliance. GDPR erasure demonstrates DELETE + VACUUM + VERSION
AS OF + RESTORE proving physical data removal. Gold star schema drives compa-ratio analysis,
gender pay gap detection per department, and retention risk scoring.
"""
industry = "human_resources"
categories = ["pipeline", "medallion", "hr", "workforce"]
tags = ["SCD2", "MERGE", "pseudonymisation", "CDF", "deletion-vectors", "GDPR", "star-schema", "compa-ratio", "gender-pay-gap", "retention-risk"]
difficulty = "advanced"
estimated_time_minutes = 25
load_type = "full"

[project.pipeline]
name = "hr_workforce_pipeline"
schedule = "0 6 * * *"
timezone = "America/New_York"

