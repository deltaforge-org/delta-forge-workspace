[project]
id = "ecommerce-orders"
name = "Omnichannel E-Commerce Orders Pipeline"
version = "2.0.0"
author = "Delta Forge Team"
description = """
Omnichannel retail pipeline ingesting orders from three distinct systems (web, mobile app, POS
terminals) into a unified order stream via a 3-way UNION ALL MERGE. Handles cancellations as
soft deletes with CDF-enabled downstream inventory adjustments, builds RFM customer segmentation
using NTILE quartile scoring, detects funnel drop-offs via session window analysis with LAG-based
session break detection, and feeds a gold-layer star schema with fact_order_lines plus four
conformed dimensions. Includes schema evolution (loyalty_points), Z-ordering, bloom filters,
and comprehensive KPI dashboards for channel mix, cancellation trends, and conversion funnels.
"""
industry = "ecommerce"
categories = ["pipeline", "medallion", "ecommerce"]
tags = ["multi-source-merge", "soft-delete", "CDF", "MERGE", "RFM-segmentation", "star-schema", "incremental", "pseudonymisation", "sessionization", "funnel-analysis", "schema-evolution", "Z-order", "bloom-filter"]
difficulty = "advanced"
estimated_time_minutes = 20
load_type = "incremental"

[project.variables]
data_path = { description = "Root path for Delta table storage", required = true }
zone_prefix = { description = "Zone name for this project", required = false, default = "ecom" }
current_user = { description = "Current user for GRANT statements", required = true }

[project.pipeline]
name = "ecommerce_orders_pipeline"
schedule = "*/30 * * * *"
timezone = "UTC"

