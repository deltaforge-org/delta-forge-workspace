[project]
id = "media-streaming"
name = "Media Streaming Analytics Pipeline"
version = "1.0.0"
author = "Delta Forge Team"
description = """
Advanced media streaming pipeline implementing medallion architecture with session reconstruction
using LAG/LEAD window functions, engagement scoring (binge detection, churn signals), deletion
vectors for right-to-be-forgotten compliance, and OPTIMIZE compaction. Gold layer includes a star
schema with fact_viewing_events, user/content/device/session dimensions, and a KPI engagement
dashboard with content ROI, binge rate, and churn signal analysis.
"""
industry = "media"
categories = ["pipeline", "medallion", "media", "streaming"]
tags = ["window-functions", "session-analysis", "deletion-vectors", "engagement", "churn", "binge", "pseudonymisation"]
difficulty = "advanced"
estimated_time_minutes = 20
load_type = "incremental"

[project.variables]
data_path = { description = "Root path for Delta table storage", required = true }
zone_prefix = { description = "Zone name for this project", required = false, default = "media" }
current_user = { description = "Current user for GRANT statements", required = true }

[project.pipeline]
name = "media_streaming_pipeline"
schedule = "0 */3 * * *"
timezone = "UTC"

[[project.target_objects]]
type = "delta_table"
name = "{{zone_prefix}}.bronze.raw_viewing_events"

[[project.target_objects]]
type = "delta_table"
name = "{{zone_prefix}}.bronze.raw_users"

[[project.target_objects]]
type = "delta_table"
name = "{{zone_prefix}}.bronze.raw_content"

[[project.target_objects]]
type = "delta_table"
name = "{{zone_prefix}}.bronze.raw_devices"

[[project.target_objects]]
type = "delta_table"
name = "{{zone_prefix}}.silver.sessions_reconstructed"

[[project.target_objects]]
type = "delta_table"
name = "{{zone_prefix}}.silver.engagement_scored"

[[project.target_objects]]
type = "delta_table"
name = "{{zone_prefix}}.gold.fact_viewing_events"

[[project.target_objects]]
type = "delta_table"
name = "{{zone_prefix}}.gold.dim_user"

[[project.target_objects]]
type = "delta_table"
name = "{{zone_prefix}}.gold.dim_content"

[[project.target_objects]]
type = "delta_table"
name = "{{zone_prefix}}.gold.dim_device"

[[project.target_objects]]
type = "delta_table"
name = "{{zone_prefix}}.gold.dim_session"

[[project.target_objects]]
type = "delta_table"
name = "{{zone_prefix}}.gold.kpi_engagement"
