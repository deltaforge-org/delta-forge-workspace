[project]
id = "agriculture-crop-yields"
name = "Agriculture Crop Yields Pipeline"
version = "1.0.0"
author = "Delta Forge Team"
description = """
Advanced agriculture analytics pipeline implementing medallion architecture with regional
crop yield benchmarking, weather correlation analysis, and field-level performance scorecards.
Features schema evolution for new sensor types across seasons, CHECK constraints on yield
and moisture ranges, and partitioning by region and crop type. Gold-layer star schema with
fact_harvest, field/crop/season/weather dimensions, and KPI yield analysis with weather
correlation and profitability ranking.
"""
industry = "agriculture"
categories = ["pipeline", "medallion", "agriculture"]
tags = ["schema-evolution", "check-constraints", "partitioning", "star-schema", "weather-correlation", "yield-benchmarking"]
difficulty = "advanced"
estimated_time_minutes = 15
load_type = "full"

[project.variables]
data_path = { description = "Root path for Delta table storage", required = true }
zone_prefix = { description = "Zone name for this project", required = false, default = "agri" }
current_user = { description = "Current user for GRANT statements", required = true }

[project.pipeline]
name = "agriculture_crop_yields_pipeline"
schedule = "0 12 * * *"
timezone = "UTC"

[[project.target_objects]]
type = "delta_table"
name = "{{zone_prefix}}.bronze.raw_harvests"

[[project.target_objects]]
type = "delta_table"
name = "{{zone_prefix}}.bronze.raw_fields"

[[project.target_objects]]
type = "delta_table"
name = "{{zone_prefix}}.bronze.raw_weather"

[[project.target_objects]]
type = "delta_table"
name = "{{zone_prefix}}.bronze.raw_sensors"

[[project.target_objects]]
type = "delta_table"
name = "{{zone_prefix}}.silver.harvests_enriched"

[[project.target_objects]]
type = "delta_table"
name = "{{zone_prefix}}.gold.fact_harvest"

[[project.target_objects]]
type = "delta_table"
name = "{{zone_prefix}}.gold.dim_field"

[[project.target_objects]]
type = "delta_table"
name = "{{zone_prefix}}.gold.dim_crop"

[[project.target_objects]]
type = "delta_table"
name = "{{zone_prefix}}.gold.dim_season"

[[project.target_objects]]
type = "delta_table"
name = "{{zone_prefix}}.gold.dim_weather"

[[project.target_objects]]
type = "delta_table"
name = "{{zone_prefix}}.gold.kpi_yield_analysis"
