[project]
id = "education-student-records"
name = "Education Student Records Pipeline"
version = "1.0.0"
author = "Delta Forge Team"
description = """
Advanced education student records pipeline implementing medallion architecture with
constraints (GPA 0.0-4.0, credits >= 0), MERGE upsert for enrollment updates,
time travel for semester snapshots, and pseudonymisation (HASH student_name, student_id).
Features a gold-layer star schema with fact_enrollments, student/course/instructor/semester
dimensions, and academic performance KPIs including GPA distribution, retention rates,
dean's list qualification, and instructor effectiveness analysis.
"""
industry = "education"
categories = ["pipeline", "medallion", "education", "academic"]
tags = ["constraints", "MERGE", "time-travel", "pseudonymisation", "star-schema", "GPA-analysis", "retention"]
difficulty = "advanced"
estimated_time_minutes = 18
load_type = "full"

[project.variables]
data_path = { description = "Root path for Delta table storage", required = true }
zone_prefix = { description = "Zone name for this project", required = false, default = "edu" }
current_user = { description = "Current user for GRANT statements", required = true }

[project.pipeline]
name = "edu_student_records_pipeline"
schedule = "0 6 * * 1"
timezone = "America/New_York"

[[project.target_objects]]
type = "delta_table"
name = "{{zone_prefix}}.bronze.raw_students"

[[project.target_objects]]
type = "delta_table"
name = "{{zone_prefix}}.bronze.raw_courses"

[[project.target_objects]]
type = "delta_table"
name = "{{zone_prefix}}.bronze.raw_instructors"

[[project.target_objects]]
type = "delta_table"
name = "{{zone_prefix}}.bronze.raw_semesters"

[[project.target_objects]]
type = "delta_table"
name = "{{zone_prefix}}.bronze.raw_enrollments"

[[project.target_objects]]
type = "delta_table"
name = "{{zone_prefix}}.silver.enrollment_enriched"

[[project.target_objects]]
type = "delta_table"
name = "{{zone_prefix}}.silver.student_gpa"

[[project.target_objects]]
type = "delta_table"
name = "{{zone_prefix}}.gold.fact_enrollments"

[[project.target_objects]]
type = "delta_table"
name = "{{zone_prefix}}.gold.dim_student"

[[project.target_objects]]
type = "delta_table"
name = "{{zone_prefix}}.gold.dim_course"

[[project.target_objects]]
type = "delta_table"
name = "{{zone_prefix}}.gold.dim_instructor"

[[project.target_objects]]
type = "delta_table"
name = "{{zone_prefix}}.gold.dim_semester"

[[project.target_objects]]
type = "delta_table"
name = "{{zone_prefix}}.gold.kpi_academic_performance"
