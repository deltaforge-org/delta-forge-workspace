[project]
id = "insurance-claims"
name = "Insurance Claims Pipeline"
version = "1.0.0"
author = "Delta Forge Team"
description = """
Advanced insurance claims pipeline with SCD Type 2 policy tracking (two-pass MERGE: expire + insert),
time travel for point-in-time policy joins, loss ratio analytics, claims aging reports, and adjuster
performance scoring. Features CHECK constraints on amounts and dates, and a gold-layer star schema
with fact_claims and SCD2 dim_policy.
"""
industry = "insurance"
categories = ["pipeline", "medallion", "insurance"]
tags = ["PII", "data-protection", "transformation", "full-load", "SCD2", "time-travel", "loss-ratio", "star-schema"]
difficulty = "advanced"
estimated_time_minutes = 15
load_type = "full"

[project.variables]
data_path = { description = "Root path for Delta table storage", required = true }
zone_prefix = { description = "Zone name for this project", required = false, default = "ins" }
current_user = { description = "Current user for GRANT statements", required = true }

[project.pipeline]
name = "ins_claims_pipeline"
schedule = "0 7 * * 1"
timezone = "America/Chicago"

[[project.target_objects]]
type = "delta_table"
name = "{{zone_prefix}}.bronze.raw_policies"

[[project.target_objects]]
type = "delta_table"
name = "{{zone_prefix}}.bronze.raw_claims"

[[project.target_objects]]
type = "delta_table"
name = "{{zone_prefix}}.bronze.raw_claimants"

[[project.target_objects]]
type = "delta_table"
name = "{{zone_prefix}}.bronze.raw_adjusters"

[[project.target_objects]]
type = "delta_table"
name = "{{zone_prefix}}.silver.dim_policy_scd2"

[[project.target_objects]]
type = "delta_table"
name = "{{zone_prefix}}.silver.claims_enriched"

[[project.target_objects]]
type = "delta_table"
name = "{{zone_prefix}}.gold.dim_policy"

[[project.target_objects]]
type = "delta_table"
name = "{{zone_prefix}}.gold.dim_claimant"

[[project.target_objects]]
type = "delta_table"
name = "{{zone_prefix}}.gold.dim_adjuster"

[[project.target_objects]]
type = "delta_table"
name = "{{zone_prefix}}.gold.fact_claims"

[[project.target_objects]]
type = "delta_table"
name = "{{zone_prefix}}.gold.kpi_loss_ratios"
