[project]
id = "insurance-claims"
name = "Property & Casualty Insurance Claims Pipeline"
version = "2.0.0"
author = "Delta Forge Team"
description = """
Property & casualty insurance pipeline with SCD Type 2 policy tracking across three change batches
(initial load, premium increases, coverage upgrades), point-in-time policy joins for incident-date-
accurate enrichment, fraud outlier detection using statistical scoring (claim_amount vs coverage-type
average), RESTORE-based correction workflow for bad batch rollback, CDF-enabled actuarial snapshots
capturing every claim status change, and a gold-layer star schema with fact_claims, dim_claimant,
dim_adjuster, dim_coverage_type, plus KPI dashboards for loss ratios and adjuster performance.
Includes CHECK constraints, bloom filters, and comprehensive referential integrity validation.
"""
industry = "insurance"
categories = ["pipeline", "medallion", "insurance"]
tags = ["SCD2", "point-in-time-join", "RESTORE", "CDF", "fraud-detection", "CHECK-constraints", "loss-ratio", "star-schema", "pseudonymisation", "actuarial"]
difficulty = "advanced"
estimated_time_minutes = 20
load_type = "full"

[project.variables]
data_path = { description = "Root path for Delta table storage", required = true }
zone_prefix = { description = "Zone name for this project", required = false, default = "ins" }
current_user = { description = "Current user for GRANT statements", required = true }

[project.pipeline]
name = "ins_claims_pipeline"
schedule = "0 7 * * 1"
timezone = "America/Chicago"

[[project.target_objects]]
type = "delta_table"
name = "{{zone_prefix}}.bronze.raw_policies"

[[project.target_objects]]
type = "delta_table"
name = "{{zone_prefix}}.bronze.raw_claims"

[[project.target_objects]]
type = "delta_table"
name = "{{zone_prefix}}.bronze.raw_claimants"

[[project.target_objects]]
type = "delta_table"
name = "{{zone_prefix}}.bronze.raw_adjusters"

[[project.target_objects]]
type = "delta_table"
name = "{{zone_prefix}}.silver.policy_dim"

[[project.target_objects]]
type = "delta_table"
name = "{{zone_prefix}}.silver.claims_enriched"

[[project.target_objects]]
type = "delta_table"
name = "{{zone_prefix}}.silver.actuarial_snapshots"

[[project.target_objects]]
type = "delta_table"
name = "{{zone_prefix}}.gold.dim_claimant"

[[project.target_objects]]
type = "delta_table"
name = "{{zone_prefix}}.gold.dim_adjuster"

[[project.target_objects]]
type = "delta_table"
name = "{{zone_prefix}}.gold.dim_coverage_type"

[[project.target_objects]]
type = "delta_table"
name = "{{zone_prefix}}.gold.fact_claims"

[[project.target_objects]]
