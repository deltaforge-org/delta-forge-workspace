[project]
id = "legal-case-management"
name = "Legal Case Management Pipeline"
version = "2.0.0"
author = "Delta Forge Team"
description = """
Litigation analytics pipeline combining Delta tables with a property graph for relationship
analysis. Cypher queries reveal hidden connections between parties, conflict-of-interest chains,
and attorney influence networks. PageRank identifies most-influential attorneys, community
detection (Louvain) discovers practice groups from co-counsel edges, and multi-hop traversals
perform conflict-of-interest checks. PII of clients and witnesses is pseudonymised via REDACT,
MASK, and keyed_hash. Gold star schema drives firm performance KPIs including utilization rates,
revenue per attorney, and case profitability.
"""
industry = "legal"
categories = ["pipeline", "medallion", "legal", "graph"]
tags = ["PII", "data-protection", "graph", "cypher", "pagerank", "community-detection", "star-schema", "billing", "pseudonymisation"]
difficulty = "advanced"
estimated_time_minutes = 20
load_type = "full"

[project.pipeline]
name = "legal_billing_pipeline"
schedule = "0 7 * * *"
timezone = "America/New_York"

[[project.target_objects]]
