[project]
id = "sports-analytics"
name = "Sports Analytics Pipeline"
version = "1.0.0"
author = "Delta Forge Team"
description = """
Advanced sports analytics pipeline implementing medallion architecture with player
performance scoring, match statistics, graph-based player network analysis, and
position-specific leaderboards. Features graph queries for transfer network (pageRank),
teammate chemistry (mutual assists), and opponent matchup history. MERGE upsert for
rolling player stats, Z-ordering on player_id+season. Gold-layer star schema with
fact_match_performance, player/team/match/season dimensions, player network graph,
and KPI player rankings with composite scoring.
"""
industry = "sports"
categories = ["pipeline", "medallion", "sports"]
tags = ["graph", "cypher", "pageRank", "merge-upsert", "z-ordering", "star-schema", "player-network", "composite-scoring"]
difficulty = "advanced"
estimated_time_minutes = 15
load_type = "full"

[project.variables]
data_path = { description = "Root path for Delta table storage", required = true }
zone_prefix = { description = "Zone name for this project", required = false, default = "sport" }
current_user = { description = "Current user for GRANT statements", required = true }

[project.pipeline]
name = "sports_analytics_pipeline"
schedule = "0 23 * * *"
timezone = "UTC"

[[project.target_objects]]
type = "delta_table"
name = "{{zone_prefix}}.bronze.raw_players"

[[project.target_objects]]
type = "delta_table"
name = "{{zone_prefix}}.bronze.raw_teams"

[[project.target_objects]]
