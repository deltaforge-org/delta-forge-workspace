[project]
id = "real-estate-property"
name = "Real Estate Property Pipeline"
version = "2.0.0"
author = "DeltaForge Team"
description = """
Enterprise county assessor property pipeline implementing SCD Type 2 with 3 annual assessment batches
(2022/2023/2024) tracking property value history, RESTORE correction workflow for bad assessment batches,
bloom filters on parcel_id for fast lookup, time travel for "value as of assessment date", partitioning
by county, window functions for YoY assessment trends, neighborhood benchmarking, and assessment accuracy
analysis comparing assessed_value to actual sale_price. Features dim_neighborhood, dim_agent,
dim_property_type, fact_transactions star schema with price_per_sqft, over_asking_pct, days_on_market,
assessed_vs_sale_ratio, kpi_market_trends by city x property_type x quarter, and kpi_assessment_accuracy.
18 properties, 40 assessments (3 batches), 25 sales, 6 neighborhoods, 8 agents. Pseudonymisation
via keyed_hash on buyer_name and seller_name.
"""
industry = "real_estate"
categories = ["pipeline", "medallion", "real-estate", "property", "assessment"]
tags = ["SCD2", "bloom-filter", "RESTORE", "pseudonymisation", "star-schema", "market-trends", "price-analysis", "assessment-accuracy", "partitioning", "time-travel"]
difficulty = "advanced"
estimated_time_minutes = 25
load_type = "full"

[project.pipeline]
name = "realty_property_pipeline"
schedule = "0 9 * * *"
timezone = "America/New_York"

