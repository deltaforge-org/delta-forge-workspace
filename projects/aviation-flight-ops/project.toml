[project]
id = "aviation-flight-ops"
name = "Aviation Flight Operations Pipeline"
version = "1.0.0"
author = "Delta Forge Team"
description = """
Advanced aviation flight operations pipeline implementing medallion architecture with MERGE on
composite keys (flight_number+departure_date), Z-ordering on route for range queries, and time
travel for schedule version comparison. Gold layer includes a star schema with fact_flights,
route/aircraft/crew/date dimensions, and a KPI on-time performance dashboard with OTP percentage,
fuel efficiency, route profitability (revenue per ASM), and delay cause Pareto analysis.
"""
industry = "aviation"
categories = ["pipeline", "medallion", "aviation"]
tags = ["composite-key-merge", "z-order", "time-travel", "otp", "fuel-efficiency", "star-schema", "pseudonymisation"]
difficulty = "advanced"
estimated_time_minutes = 20
load_type = "both"

[project.variables]
data_path = { description = "Root path for Delta table storage", required = true }
zone_prefix = { description = "Zone name for this project", required = false, default = "avtn" }
current_user = { description = "Current user for GRANT statements", required = true }

[project.pipeline]
name = "aviation_flight_ops_pipeline"
schedule = "0 4 * * *"
timezone = "UTC"

[[project.target_objects]]
type = "delta_table"
name = "{{zone_prefix}}.bronze.raw_flight_ops"

[[project.target_objects]]
type = "delta_table"
name = "{{zone_prefix}}.bronze.raw_routes"

[[project.target_objects]]
type = "delta_table"
name = "{{zone_prefix}}.bronze.raw_aircraft"

[[project.target_objects]]
type = "delta_table"
name = "{{zone_prefix}}.bronze.raw_crew"

[[project.target_objects]]
type = "delta_table"
name = "{{zone_prefix}}.silver.flights_enriched"

[[project.target_objects]]
type = "delta_table"
name = "{{zone_prefix}}.gold.fact_flights"

[[project.target_objects]]
type = "delta_table"
name = "{{zone_prefix}}.gold.dim_route"

[[project.target_objects]]
type = "delta_table"
name = "{{zone_prefix}}.gold.dim_aircraft"

[[project.target_objects]]
type = "delta_table"
name = "{{zone_prefix}}.gold.dim_crew"

[[project.target_objects]]
type = "delta_table"
name = "{{zone_prefix}}.gold.dim_date"

[[project.target_objects]]
type = "delta_table"
name = "{{zone_prefix}}.gold.kpi_otp"
