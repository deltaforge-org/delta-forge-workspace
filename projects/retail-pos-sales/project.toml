[project]
id = "retail-pos-sales"
name = "Retail POS Sales Pipeline"
version = "1.0.0"
author = "Delta Forge Team"
description = """
Advanced retail point-of-sale pipeline implementing medallion architecture with Bloom filters
for receipt_id fast lookup, Z-ordering on store+date for range scans, and partition pruning by
region. Features complex window functions for running totals, period-over-period growth, and
regional store ranking. Gold layer includes a full star schema with fact_sales, four dimension
tables (store, product, date, cashier), and a KPI store performance dashboard with YoY growth
and DENSE_RANK regional ranking.
"""
industry = "retail"
categories = ["pipeline", "medallion", "retail", "pos"]
tags = ["bloom-filter", "z-order", "partition-pruning", "window-functions", "star-schema", "incremental", "yoy-growth"]
difficulty = "advanced"
estimated_time_minutes = 20
load_type = "both"

[project.variables]
data_path = { description = "Root path for Delta table storage", required = true }
zone_prefix = { description = "Zone name for this project", required = false, default = "retail" }
current_user = { description = "Current user for GRANT statements", required = true }

[project.pipeline]
name = "retail_pos_sales_pipeline"
schedule = "30 6 * * *"
timezone = "America/Chicago"

[[project.target_objects]]
type = "delta_table"
name = "{{zone_prefix}}.bronze.raw_transactions"

[[project.target_objects]]
type = "delta_table"
name = "{{zone_prefix}}.bronze.raw_stores"

[[project.target_objects]]
type = "delta_table"
name = "{{zone_prefix}}.bronze.raw_products"

[[project.target_objects]]
type = "delta_table"
name = "{{zone_prefix}}.bronze.raw_cashiers"

[[project.target_objects]]
type = "delta_table"
name = "{{zone_prefix}}.silver.transactions_enriched"

[[project.target_objects]]
type = "delta_table"
name = "{{zone_prefix}}.silver.basket_metrics"

[[project.target_objects]]
type = "delta_table"
name = "{{zone_prefix}}.gold.fact_sales"

[[project.target_objects]]
type = "delta_table"
name = "{{zone_prefix}}.gold.dim_store"

[[project.target_objects]]
type = "delta_table"
name = "{{zone_prefix}}.gold.dim_product"

[[project.target_objects]]
type = "delta_table"
name = "{{zone_prefix}}.gold.dim_date"

[[project.target_objects]]
type = "delta_table"
name = "{{zone_prefix}}.gold.dim_cashier"

[[project.target_objects]]
type = "delta_table"
name = "{{zone_prefix}}.gold.kpi_store_performance"
