[project]
id = "telecom-cdr"
name = "Telecom CDR Pipeline"
version = "2.0.0"
author = "Delta Forge Team"
description = """
Advanced telecommunications CDR pipeline implementing medallion architecture with full schema
evolution lifecycle (v1 voice-only -> v2 multi-service -> v3 5G/roaming), type widening
(duration INT -> BIGINT), session window reconstruction via LAG/LEAD gap detection, MERGE
upsert for subscriber profiles, churn risk scoring (behavioral 0-100), dropped-call detection,
network quality analytics, and VACUUM/OPTIMIZE storage governance. Features a gold-layer star
schema with fact_calls, subscriber/tower/plan dimensions, network quality KPIs, and churn risk
dashboard. Pseudonymisation generalizes phone numbers (mask last 4 digits).
"""
industry = "telecommunications"
categories = ["pipeline", "medallion", "telecommunications"]
tags = ["CDR", "schema-evolution", "type-widening", "session-reconstruction", "MERGE", "VACUUM", "OPTIMIZE", "network-quality", "churn-scoring", "star-schema", "LAG-LEAD", "pseudonymisation"]
difficulty = "advanced"
estimated_time_minutes = 20
load_type = "full"

[project.pipeline]
name = "telecom_cdr_pipeline"
schedule = "0 2 * * *"
timezone = "UTC"

