[project]
id = "mining-operations"
name = "Mining Operations Pipeline"
version = "1.0.0"
author = "Delta Forge Team"
description = """
Advanced mining operations pipeline implementing medallion architecture with extraction
tracking, strip ratio analysis, cumulative ore extraction YTD using window functions,
and reserve depletion monitoring. Features partitioning by site_id and shift, VACUUM
with retention governance, and equipment utilization rate derivation. Gold-layer star
schema with fact_extraction, site/pit/equipment/shift dimensions, and KPI production
dashboard with cost-per-tonne and safety incident tracking.
"""
industry = "mining"
categories = ["pipeline", "medallion", "mining"]
tags = ["extraction", "strip-ratio", "cumulative-ytd", "vacuum", "partitioning", "equipment-utilization", "star-schema", "incremental"]
difficulty = "advanced"
estimated_time_minutes = 15
load_type = "incremental"

[project.variables]
data_path = { description = "Root path for Delta table storage", required = true }
zone_prefix = { description = "Zone name for this project", required = false, default = "mine" }
current_user = { description = "Current user for GRANT statements", required = true }

[project.pipeline]
name = "mining_operations_pipeline"
schedule = "0 5 * * *"
timezone = "UTC"

[[project.target_objects]]
type = "delta_table"
name = "{{zone_prefix}}.bronze.raw_extractions"

[[project.target_objects]]
type = "delta_table"
name = "{{zone_prefix}}.bronze.raw_sites"

[[project.target_objects]]
type = "delta_table"
name = "{{zone_prefix}}.bronze.raw_pits"

[[project.target_objects]]
type = "delta_table"
name = "{{zone_prefix}}.bronze.raw_equipment"

[[project.target_objects]]
type = "delta_table"
name = "{{zone_prefix}}.bronze.raw_shifts"

[[project.target_objects]]
type = "delta_table"
name = "{{zone_prefix}}.silver.extractions_enriched"

[[project.target_objects]]
type = "delta_table"
name = "{{zone_prefix}}.gold.fact_extraction"

[[project.target_objects]]
