name = "{{zone_prefix}}.gold.dim_site"

[[project.target_objects]]
type = "delta_table"
name = "{{zone_prefix}}.gold.dim_pit"

[[project.target_objects]]
type = "delta_table"
name = "{{zone_prefix}}.gold.dim_equipment"

[[project.target_objects]]
