[project]
id = "healthcare-patient-ehr"
name = "Healthcare Patient EHR Pipeline"
version = "1.0.0"
author = "Delta Forge Team"
description = """
Advanced healthcare EHR (Electronic Health Record) pipeline implementing medallion architecture
with patient record deduplication, readmission detection using window functions, length-of-stay
percentile analysis, and comprehensive pseudonymisation for HIPAA compliance. Features a gold-layer
star schema with fact_admissions and supporting dimension tables for department and diagnosis analytics.
"""
industry = "healthcare"
categories = ["pipeline", "medallion", "healthcare"]
tags = ["PII", "data-protection", "transformation", "both", "pseudonymisation", "HIPAA", "readmission-detection", "window-functions", "star-schema"]
difficulty = "advanced"
estimated_time_minutes = 15
load_type = "both"

[project.variables]
data_path = { description = "Root path for Delta table storage", required = true }
zone_prefix = { description = "Zone name for this project", required = false, default = "ehr" }
current_user = { description = "Current user for GRANT statements", required = true }

[project.pipeline]
name = "ehr_patient_pipeline"
schedule = "0 5 * * *"
timezone = "America/New_York"

[[project.target_objects]]
type = "delta_table"
name = "{{zone_prefix}}.bronze.raw_admissions"

[[project.target_objects]]
type = "delta_table"
name = "{{zone_prefix}}.bronze.raw_departments"

[[project.target_objects]]
type = "delta_table"
name = "{{zone_prefix}}.bronze.raw_diagnoses"

[[project.target_objects]]
type = "delta_table"
name = "{{zone_prefix}}.silver.admissions_cleaned"

[[project.target_objects]]
type = "delta_table"
name = "{{zone_prefix}}.silver.patients_deduped"

[[project.target_objects]]
type = "delta_table"
name = "{{zone_prefix}}.gold.dim_department"

[[project.target_objects]]
type = "delta_table"
name = "{{zone_prefix}}.gold.dim_diagnosis"

[[project.target_objects]]
type = "delta_table"
name = "{{zone_prefix}}.gold.fact_admissions"

[[project.target_objects]]
type = "delta_table"
name = "{{zone_prefix}}.gold.kpi_readmission_rates"
