[project]
id = "logistics-shipments"
name = "Logistics Shipments Pipeline"
version = "2.0.0"
author = "Delta Forge Team"
description = """
Global logistics pipeline implementing event sourcing with idempotent composite-key deduplication
(shipment_id + event_type + event_timestamp), shipment timeline reconstruction via window functions,
SLA violation detection against carrier contracts, schema evolution (customs clearance fields),
Z-ordering for route optimization queries, and a gold-layer star schema with carrier performance
and SLA compliance KPI dashboards. Seed data includes 80 tracking events across 25 shipments with
15 exact duplicates, 5 out-of-order events, 3 SLA violations, and 2 exception shipments.
"""
industry = "logistics"
categories = ["pipeline", "medallion", "logistics"]
tags = ["event-sourcing", "idempotent-dedup", "composite-key", "schema-evolution", "Z-order", "SLA-compliance", "star-schema", "window-functions", "timeline-reconstruction"]
difficulty = "advanced"
estimated_time_minutes = 20
load_type = "incremental"

[project.variables]
data_path = { description = "Root path for Delta table storage", required = true }
zone_prefix = { description = "Zone name for this project", required = false, default = "logi" }
current_user = { description = "Current user for GRANT statements", required = true }

[project.pipeline]
name = "logistics_shipments_pipeline"
schedule = "0 */6 * * *"
timezone = "UTC"

[[project.target_objects]]
type = "delta_table"
name = "{{zone_prefix}}.bronze.raw_tracking_events"

